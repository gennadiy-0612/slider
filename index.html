<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphing Polygon Slider</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #0f172a;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* Контейнер слайдера */
    .slider-container {
      position: relative;
      width: 800px;
      height: 450px;
      background-color: #020617;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }

    .slides-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Базовий слайд */
    .slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      z-index: 1;

      /* КЛЮЧОВЕ: Плавний морфінг (зміна форми та прозорості) */
      transition: clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1),
                  opacity 0.6s ease-in-out,
                  transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
      
      /* Початковий стан трансформації для ефекту морфінгу */
      transform: scale(0.92);
    }

    /* Активний слайд, який з'являється */
    .slide.is-active {
      opacity: 1;
      pointer-events: auto;
      z-index: 3;
      transform: scale(1);
    }

    /* Слайд, який зараз виходить (для плавного переходу форми) */
    .slide.is-exiting {
      opacity: 0;
      z-index: 2;
      transform: scale(1.05);
    }

    /* Вміст слайда */
    .slide-content {
      font-size: 6rem;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 0 10px 20px rgba(0,0,0,0.4);
      user-select: none;
    }

    /* --- ПОЛІГОНИ ТА КОЛЬОРИ (Всі мають по 4 точки для синхронного морфінгу) --- */
    
    /* Slide 1: Косий паралелограм */
    .slide:nth-child(1) {
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
    }

    /* Slide 2: Трапеція */
    .slide:nth-child(2) {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
    }

    /* Slide 3: Ромб / Алмаз */
    .slide:nth-child(3) {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    /* Slide 4: Перевернута трапеція */
    .slide:nth-child(4) {
      background: linear-gradient(135deg, #10b981, #059669);
      clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%);
    }

    /* Slide 5: Скошений чотирикутник A */
    .slide:nth-child(5) {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      clip-path: polygon(0% 20%, 100% 0%, 80% 100%, 10% 80%);
    }

    /* Slide 6: Скошений чотирикутник B */
    .slide:nth-child(6) {
      background: linear-gradient(135deg, #ec4899, #be185d);
      clip-path: polygon(20% 0%, 100% 20%, 80% 100%, 0% 80%);
    }

    /* Slide 7: Вертикальний прямокутник у центрі */
    .slide:nth-child(7) {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      clip-path: polygon(15% 5%, 85% 5%, 85% 95%, 15% 95%);
    }

    /* Slide 8: Горизонтальний прямокутник */
    .slide:nth-child(8) {
      background: linear-gradient(135deg, #84cc16, #65a30d);
      clip-path: polygon(5% 15%, 95% 15%, 95% 85%, 5% 85%);
    }

    /* --- КНОПКИ УПРАВЛІННЯ --- */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.3rem;
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      z-index: 10;
    }

    .nav-btn:hover {
      background: #ffffff;
      color: #0f172a;
      transform: translateY(-50%) scale(1.1);
    }

    .nav-btn.prev { left: 24px; }
    .nav-btn.next { right: 24px; }

    /* Пагінація (Крапки) */
    .pagination {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
      background: rgba(15, 23, 42, 0.6);
      padding: 10px 20px;
      border-radius: 30px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.3);
      border: none;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dot.is-active {
      background-color: #ffffff;
      transform: scale(1.4);
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="slider-container" id="polygonSlider">
    <div class="slides-wrapper">
      <div class="slide"><span class="slide-content">01</span></div>
      <div class="slide"><span class="slide-content">02</span></div>
      <div class="slide"><span class="slide-content">03</span></div>
      <div class="slide"><span class="slide-content">04</span></div>
      <div class="slide"><span class="slide-content">05</span></div>
      <div class="slide"><span class="slide-content">06</span></div>
      <div class="slide"><span class="slide-content">07</span></div>
      <div class="slide"><span class="slide-content">08</span></div>
    </div>

    <button class="nav-btn prev" aria-label="Назад">&#10094;</button>
    <button class="nav-btn next" aria-label="Вперед">&#10095;</button>

    <div class="pagination"></div>
  </div>

  <script>
    class PolygonSliderService {
      #containerEl;
      #slides;
      #prevBtn;
      #nextBtn;
      #dotsContainer;
      #dots = [];
      #currentIndex = 0;
      #isAnimating = false;
      #options;
      #controller = new AbortController();

      constructor(target, options = {}) {
        this.#containerEl = typeof target === 'string' ? document.querySelector(target) : target;

        if (!this.#containerEl) {
          throw new Error(`[PolygonSliderService] Контейнер не знайдено: ${target}`);
        }

        this.#options = {
          activeClass: 'is-active',
          exitingClass: 'is-exiting',
          duration: 800, // Час анімації в мілісекундах
          startIndex: 0,
          onChange: null,
          ...options
        };

        this.#slides = Array.from(this.#containerEl.querySelectorAll('.slide'));
        this.#prevBtn = this.#containerEl.querySelector('.nav-btn.prev');
        this.#nextBtn = this.#containerEl.querySelector('.nav-btn.next');
        this.#dotsContainer = this.#containerEl.querySelector('.pagination');

        this.#currentIndex = this.#options.startIndex;

        this.#init();
      }

      goTo(index) {
        // Запобігаємо занадто швидкому кліканню під час анімації
        if (this.#isAnimating || index === this.#currentIndex) return this;

        let targetIndex = index;
        if (index < 0) {
          targetIndex = this.#slides.length - 1;
        } else if (index >= this.#slides.length) {
          targetIndex = 0;
        }

        this.#animateTransition(this.#currentIndex, targetIndex);
        this.#currentIndex = targetIndex;

        return this;
      }

      next() { return this.goTo(this.#currentIndex + 1); }
      prev() { return this.goTo(this.#currentIndex - 1); }

      destroy() {
        this.#controller.abort();
        this.#containerEl = null;
        this.#slides = [];
        this.#dots = [];
      }

      #init() {
        this.#renderDots();
        
        // Початкова установка першого слайда
        this.#slides[this.#currentIndex].classList.add(this.#options.activeClass);
        this.#dots[this.#currentIndex]?.classList.add(this.#options.activeClass);

        this.#initEvents();
      }

      #animateTransition(oldIndex, newIndex) {
        this.#isAnimating = true;

        const prevSlide = this.#slides[oldIndex];
        const nextSlide = this.#slides[newIndex];
        const { activeClass, exitingClass, duration } = this.#options;

        // 1. Попередній слайд переходить у стан "виходу"
        prevSlide.classList.remove(activeClass);
        prevSlide.classList.add(exitingClass);

        // 2. Новий слайд стає "активним" і розгортає свою форму
        nextSlide.classList.add(activeClass);

        // 3. Оновлюємо крапки
        this.#dots[oldIndex]?.classList.remove(activeClass);
        this.#dots[newIndex]?.classList.add(activeClass);

        // 4. Після закінчення CSS-анімації знімаємо тимчасові класи
        setTimeout(() => {
          prevSlide.classList.remove(exitingClass);
          this.#isAnimating = false;
        }, duration);

        this.#dispatchEvents();
      }

      #renderDots() {
        if (!this.#dotsContainer) return;

        this.#dotsContainer.innerHTML = '';
        this.#dots = this.#slides.map((_, index) => {
          const dot = document.createElement('button');
          dot.classList.add('dot');
          dot.setAttribute('aria-label', `Слайд ${index + 1}`);
          this.#dotsContainer.appendChild(dot);
          return dot;
        });
      }

      #initEvents() {
        const { signal } = this.#controller;

        this.#nextBtn?.addEventListener('click', () => this.next(), { signal });
        this.#prevBtn?.addEventListener('click', () => this.prev(), { signal });

        this.#dotsContainer?.addEventListener('click', (e) => {
          const dotIndex = this.#dots.indexOf(e.target);
          if (dotIndex !== -1) this.goTo(dotIndex);
        }, { signal });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowRight') this.next();
          if (e.key === 'ArrowLeft') this.prev();
        }, { signal });
      }

      #dispatchEvents() {
        if (typeof this.#options.onChange === 'function') {
          this.#options.onChange(this.#currentIndex, this);
        }

        this.#containerEl.dispatchEvent(new CustomEvent('slider:change', {
          bubbles: true,
          detail: { index: this.#currentIndex, instance: this }
        }));
      }
    }

    // Запуск після завантаження DOM
    document.addEventListener('DOMContentLoaded', () => {
      const slider = new PolygonSliderService('#polygonSlider');
    });
  </script>
</body>
</html>

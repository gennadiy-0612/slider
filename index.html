<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="w3-container w3-teal">
        <h1>Анімація</h1>
    </header>

    <div class="w3-container w3-padding-32">
        <p>Натисніть кнопку, щоб побачити сучасне модальне вікно:</p>
        <p class="triggerModal" class="w3-button w3-blue">Показати повідомлення</p>
    </div>

    <div class="customModal" class="w3-modal">
        <div class="w3-modal-content w3-card-4">
            <header class="w3-container w3-teal">
                <span class="closeModal w3-button w3-display-topright">&times;</span>
                <h2 class="modalTitle">Заголовок</h2>
            </header>
            <div class="w3-container">
                <p class="modalMessage"></p>
            </div>
            <footer class="w3-container w3-teal">
                <button class="modalBtn" class="w3-button w3-margin">ОК</button>
            </footer>
        </div>
    </div>

    <script src="js/main.js" defer></script>
</body>
</html>

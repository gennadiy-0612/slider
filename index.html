<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="w3-container w3-padding-32">
        <p>Натисніть кнопку:</p>
        <p class="triggerModal" style="cursor:pointer; background:blue; color:white; padding:10px;">Показати повідомлення</p>
    </div>

    <div class="customModal">
        <div class="w3-modal-content">
            <header>
                <span class="closeModal">&times;</span>
                <h2 class="modalTitle">Заголовок</h2>
            </header>
            <div>
                <p class="modalMessage"></p>
            </div>
            <footer>
                <p class="modalBtn">ОК</p>
            </footer>
        </div>
    </div>


    <script src="js/main.js" defer></script>
</body>
</html>
